services:
  - type: web
    name: quantum-utility-backend
    runtime: python
    repo: https://github.com/mindtechindustriesai-alt/quantum-utility-backend
    plan: free
    branch: main
    buildCommand: pip install --no-cache-dir -r backend/requirements.txt
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.11
